name: Rust

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  DEPS: libfontconfig-dev libpipewire-0.3-dev
  CARGO_TERM_COLOR: always

jobs:
  format:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          show-progress: false

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check man pages
        run: ./doc/check

      - name: Run rustfmt
        run: cargo fmt --all -- --check

  clippy:
    strategy:
      fail-fast: false
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          show-progress: false

      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ${{ env.DEPS }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: Run clippy
        run: cargo clippy --all --all-targets
        
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
      with:
        show-progress: false

    - name: Install dependencies
      run: |
        sudo apt-get update -y
        sudo apt-get install -y ${{ env.DEPS }}

    - uses: dtolnay/rust-toolchain@stable
      
    - name: Test
      run: cargo test --verbose
